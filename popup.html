<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTL Fixer</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <h1 class="logo">RTL Fixer</h1>
        <button
          class="icon-btn"
          id="themeToggle"
          title="Toggle Theme"
          aria-label="Toggle dark/light theme"
        >
          <svg
            class="sun-icon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
            ></path>
          </svg>
          <svg
            class="moon-icon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </header>

      <!-- Text Input -->
      <div class="input-group">
        <textarea
          id="textInput"
          placeholder="Type or paste Arabic / RTL text here…"
          aria-label="Text to fix"
        ></textarea>
      </div>

      <!-- Primary action -->
      <button id="fixBtn" class="primary-btn">Fix & Copy</button>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="action-btn" id="pasteBtn" title="Paste from clipboard">
          Paste
        </button>
        <button class="action-btn" id="clearBtn" title="Clear text">
          Clear
        </button>
      </div>

      <!-- Status -->
      <div id="status" class="status" role="status" aria-live="polite"></div>

      <!-- Footer -->
      <footer class="footer">
        &nbsp; For the inspector use <kbd>Ctrl+Shift+E</kbd> on any page
        <br />

        Made by
        <a
          href="https://www.linkedin.com/in/a7medfouda/"
          target="_blank"
          rel="noopener noreferrer"
          >Ahmed Fouda</a
        >
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
